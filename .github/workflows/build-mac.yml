name: Build Mac App

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install dependencies
      run: |
        pip install -r requirements.txt

    - name: Build app
      run: |
        pyinstaller --windowed --add-data "graphics:graphics" --add-data "audio:audio" main.py

    - name: Upload app
      uses: actions/upload-artifact@v4
      with:
        name: MyGame-Mac
        path: dist/

